
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Uploader Google Drive</title>
        <style>
            body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                background: #f0f8ff;
                font-family: Arial, sans-serif;
            }
            .container {
                background: #ffffff;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
                text-align: center;
                width: 400px;
            }
            input, button {
                margin-top: 10px;
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #aaa;
                width: 100%;
            }
            button {
                background-color: #007BFF;
                color: white;
                font-weight: bold;
                cursor: pointer;
            }
            button:hover {
                background-color: #0056b3;
            }
            #status {
                margin-top: 15px;
                font-size: 14px;
                color: #333;
                text-align: left;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>Uploader Google Drive</h2>
            <form id="uploadForm">
                <input type="file" name="file" multiple required><br>
                <input type="text" name="parent_folder_id" placeholder="Cole o link/ID da pasta"
       value="{{ param or '' }}">
                <button type="submit">Enviar</button>
            </form>
            <div id="status"></div>
        </div>

        <script>
            document.getElementById("uploadForm").addEventListener("submit", async function(e) {
                e.preventDefault();

                const files = e.target.file.files;
                const parentFolder = e.target.parent_folder_id.value.trim();
                const statusDiv = document.getElementById("status");

                statusDiv.innerHTML = "⏳ Enviando arquivos...<br>";

                for (let i = 0; i < files.length; i++) {
                    const formData = new FormData();
                    formData.append("file", files[i]);
                    formData.append("parent_folder_id", parentFolder);

                    try {
                        const res = await fetch("/upload-file", {
                            method: "POST",
                            body: formData
                        });
                        const data = await res.json();

                        if (data.success) {
                            statusDiv.innerHTML += `✅ ${files[i].name} enviado com sucesso<br>`;
                        } else {
                            statusDiv.innerHTML += `❌ Erro ao enviar ${files[i].name}: ${data.error}<br>`;
                        }
                    } catch (err) {
                        statusDiv.innerHTML += `⚠️ Falha de rede ao enviar ${files[i].name}<br>`;
                    }
                }

                statusDiv.innerHTML += "<br><b>📂 Upload concluído!</b>";
            });
        </script>
    </body>
    </html>
