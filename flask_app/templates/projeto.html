{% extends "base.html" %}


</style>

{% block content %}
<div class="container mt-4">

  <!-- Header com Nome e Código Becus -->
  <div class="row mb-4">
    <div class="col text-center">
      <h2 id="clienteNome" class="text-primary"></h2>
      <h5 id="becusCodigo" class="text-secondary"></h5>
    </div>
  </div>

  <!-- Informações do Projeto -->
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-primary mb-4">
        <div class="card-header bg-primary text-white">Informações do Projeto</div>
        <div class="card-body">
          <label>Solicitação:</label>
          <input id="solicitacao" class="form-control mb-2">

          <label>Prazo:</label>
          <input id="prazo" class="form-control mb-2">

          <label>Visita:</label>
          <input id="visita" class="form-control mb-2">

          <label>Desenhista:</label>
          <input id="desenhista" class="form-control mb-2" oninput="validDesenhista()">
          <div class="invalid-feedback">
            Desenhista inválido. Escolha um usuário da lista.
          </div>

          <label>Revisor:</label>
          <input id="revisor" class="form-control mb-2">

          <label>Data Entrega:</label>
          <input id="dataEntrega" type="date" class="form-control mb-2">

          <label>Status:</label>
          <div class="input-group mb-2">
            <input type="text" id="statusProjeto" class="form-control" readonly>
            <button class="btn btn-outline-primary" type="button" data-bs-toggle="modal" data-bs-target="#modalStatus">
              Selecionar
            </button>
            </div>

          <button class="btn btn-success" onclick="saveProjeto()">Salvar Projeto</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Status e Changelog -->
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-info mb-4">
        <div class="card-header bg-info text-white">Status e Changelog</div>
        <div class="card-body">
          <ul id="changelogList"></ul>
        </div>
      </div>
    </div>
  </div>

<!-- Abas Correções e Comentários -->
<div class="row justify-content-center">
  <div class="col-md-8">
    <ul class="nav nav-tabs">
      <li class="nav-item">
        <a class="nav-link text-dark bg-dark" id="tab-correcoes-link" data-bs-toggle="tab" href="#tab-correcoes">Correções</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-dark bg-dark" id="tab-observacoes-link" data-bs-toggle="tab" href="#tab-observacoes">Comentários</a>
      </li>
    </ul>
    <div class="tab-content p-3 border border-top-0">
      <!-- Correções -->
      <div class="tab-pane" id="tab-correcoes">
        <div id="correcoesList"></div>
        <textarea id="novaCorrecao" class="form-control mt-2" placeholder="Nova correção"></textarea>
        <button class="btn btn-primary mt-2" onclick="addCorrecao()">Adicionar Correção</button>
      </div>
      <!-- Comentários -->
      <div class="tab-pane fade" id="tab-observacoes">
        <div id="observacoesList"></div>
        <textarea id="novoComentario" class="form-control mt-2" placeholder="Adicione um comentário"></textarea>
        <button class="btn btn-primary mt-2" onclick="addObservacao()">Adicionar Comentário</button>
      </div>
    </div>
  </div>
</div>
<!-- Modal Status -->
<div class="modal fade" id="modalStatus" tabindex="-1" aria-labelledby="modalStatusLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-primary">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalStatusLabel">Selecionar Status</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <ul class="list-group" id="listaStatus">
          <!-- Status serão carregados via JS -->
        </ul>
      </div>
    </div>
  </div>
</div>
</div>

<script>
const clientId = "{{ client_id }}";
const projetoId = "{{ projeto_id }}";
const statusList = {{ status_list | tojson }};
const user = "{{ session['user_name'] }}";
const user_list = {{ user_list | tojson }};

function validDesenhista() {
  const desenhistaInput = document.getElementById("desenhista");
  const desenhista = desenhistaInput.value.trim();

  if (!desenhista || user_list.includes(desenhista)) {
    // Remove a marcação se for vazio ou válido
    desenhistaInput.classList.remove("is-invalid");
  } else {
    // Marca como inválido
    desenhistaInput.classList.add("is-invalid");
  }
}


function formatarData(isoString) {
  const data = new Date(isoString);

  const dia = String(data.getDate()).padStart(2, "0");
  const mes = String(data.getMonth() + 1).padStart(2, "0"); // mês começa do 0
  const ano = data.getFullYear();

  const horas = String(data.getHours()).padStart(2, "0");
  const minutos = String(data.getMinutes()).padStart(2, "0");

  return `${dia}/${mes}/${ano} ${horas}:${minutos}`;
}

document.addEventListener("DOMContentLoaded", async () => {
  console.log(statusList);
  console.log("teste");
  await loadProjeto();
});



// ----------------------- Projeto -----------------------
async function loadProjeto() {
  const res = await fetch(`/projetos/${projetoId}`);
  const projeto = await res.json();

  // Cabeçalho
  document.getElementById("clienteNome").textContent = projeto.cliente.name;
  document.getElementById("becusCodigo").textContent = `Código Becus: ${projeto.cliente.becus_id}`;

  // Inputs do projeto
  document.getElementById("solicitacao").value = projeto.solicitacao || "";
  document.getElementById("prazo").value = projeto.prazo || "";
  document.getElementById("visita").value = projeto.visita || "";
  document.getElementById("desenhista").value = projeto.desenhista || "";
  document.getElementById("revisor").value = projeto.revisor || "";
  document.getElementById("dataEntrega").value = projeto.data_entrega || "";
  document.getElementById("statusProjeto").value = projeto.status || "";

  // Changelog
  const changelog = document.getElementById("changelogList");
  changelog.innerHTML = '';
  if(projeto.history){
    projeto.history.forEach(h => {
      const li = document.createElement('li');
      li.textContent = `[${formatarData(h.timestamp)}]  ${user} ${h.action}`;
      changelog.appendChild(li);
    });
  }

  // Carrega abas
  loadCorrecoes();
  loadObservacoes();
}

function carregarStatusModal() {
  const lista = document.getElementById("listaStatus");
  lista.innerHTML = "";

  statusList.forEach(status => {
    const li = document.createElement("li");
    li.classList.add("list-group-item", "list-group-item-action");
    li.style.cursor = "pointer";
    li.textContent = status; // usar diretamente, não status.name

    li.addEventListener("click", () => {
      document.getElementById("statusProjeto").value = status;
      // Fecha o modal
      const modalEl = document.getElementById("modalStatus");
      const modalInstance = bootstrap.Modal.getOrCreateInstance(modalEl);
      modalInstance.hide();
    });

    lista.appendChild(li);
  });
}

// Carregar modal ao abrir
const modalStatusEl = document.getElementById('modalStatus');
modalStatusEl.addEventListener('show.bs.modal', carregarStatusModal);

async function saveProjeto() {
  const data = {
    solicitacao: document.getElementById("solicitacao").value,
    prazo: document.getElementById("prazo").value,
    visita: document.getElementById("visita").value,
    desenhista: document.getElementById("desenhista").value,
    revisor: document.getElementById("revisor").value,
    data_entrega: document.getElementById("dataEntrega").value,
    status: document.getElementById("statusProjeto").value,
    user_id: "{{ session['user_id'] }}"
  };

  const res = await fetch(`/projetos/${projetoId}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });

  if(res.ok) alert('Projeto atualizado com sucesso');
  else alert('Erro ao atualizar projeto');
  loadProjeto();
}

// ----------------------- Correções -----------------------
async function loadCorrecoes() {
  const res = await fetch(`/projetos/${projetoId}/correcoes`);
  const correcoes = await res.json();
  const container = document.getElementById('correcoesList');
  container.innerHTML = '';

  correcoes.forEach(c => {
    const div = document.createElement('div');
    div.classList.add('mb-2');
    div.innerHTML = `
      <input type="text" class="form-control mb-1" value="${c.descricao}" id="correcao-${c.id}">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="corrigida-${c.id}" ${c.corrigida ? 'checked' : ''}>
        <label class="form-check-label">Corrigida</label>
      </div>
      <button class="btn btn-success btn-sm mt-1" onclick="saveCorrecao(${c.id})">Salvar</button>
      <button class="btn btn-danger btn-sm mt-1" onclick="deleteCorrecao(${c.id})">Excluir</button>
      <hr>
    `;
    container.appendChild(div);
  });
}

async function saveCorrecao(id) {
  const descricao = document.getElementById(`correcao-${id}`).value;
  const corrigida = document.getElementById(`corrigida-${id}`).checked;
  const res = await fetch(`/projetos/${projetoId}/correcoes/${id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ descricao, corrigida, user_id: "{{ session['user_id'] }}" })
  });
  if(res.ok) alert('Correção salva com sucesso');
  else alert('Erro ao salvar correção');
}

async function deleteCorrecao(id) {
  const res = await fetch(`/projetos/${projetoId}/correcoes/${id}`, { method: 'DELETE' });
  if(res.ok) loadCorrecoes();
  else alert('Erro ao excluir correção');
}

async function addCorrecao() {
  const descricao = document.getElementById('novaCorrecao').value;
  if(!descricao) return alert('Digite a descrição da correção');
  const res = await fetch(`/projetos/${projetoId}/correcoes`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ descricao, user_id: "{{ session['user_id'] }}" })
  });
  if(res.ok) {
    document.getElementById('novaCorrecao').value = '';
    loadCorrecoes();
  } else alert('Erro ao adicionar correção');
}

// ----------------------- Observações -----------------------
async function loadObservacoes() {
  const res = await fetch(`/projetos/${projetoId}/observacoes`);
  const observacoes = await res.json();
  const container = document.getElementById('observacoesList');
  container.innerHTML = '';

  if(observacoes.length === 0){
    const p = document.createElement('div');
    p.classList.add('text-muted');
    p.textContent = "Nenhum comentário ainda.";
    container.appendChild(p);
    return;
  }

  observacoes.forEach(o => {
    const div = document.createElement('div');
    div.classList.add('mb-2');
    div.innerHTML = `
      <textarea class="form-control mb-1" id="obs-${o.id}" placeholder="Digite seu comentário">${o.comentario || ''}</textarea>
      <button class="btn btn-success btn-sm me-1" onclick="saveObservacao(${o.id})">Salvar</button>
      <button class="btn btn-danger btn-sm" onclick="deleteObservacao(${o.id})">Excluir</button>
      <hr>
    `;
    container.appendChild(div);
  });
}

async function saveObservacao(id) {
  const comentario = document.getElementById(`obs-${id}`).value;
  const res = await fetch(`/projetos/${projetoId}/observacoes/${id}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ comentario, user_id: "{{ session['user_id'] }}" })
  });
  if(res.ok) alert('Comentário salvo com sucesso');
  else alert('Erro ao salvar comentário');
}

async function deleteObservacao(id) {
  const res = await fetch(`/projetos/${projetoId}/observacoes/${id}`, { method: 'DELETE' });
  if(res.ok) loadObservacoes();
  else alert('Erro ao excluir comentário');
}

async function addObservacao() {
  const comentario = document.getElementById('novoComentario').value;
  if(!comentario) return alert('Digite um comentário');
  const res = await fetch(`/projetos/${projetoId}/observacoes`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ comentario, user_id: "{{ session['user_id'] }}" })
  });
  if(res.ok) {
    document.getElementById('novoComentario').value = '';
    loadObservacoes();
  } else alert('Erro ao adicionar comentário');
}
</script>

{% endblock %}
