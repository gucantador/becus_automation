<!-- Botão para expandir/recolher -->
<button class="btn btn-outline-primary mb-2" type="button" data-bs-toggle="collapse" data-bs-target="#collapserevisor" aria-expanded="false" aria-controls="collapserevisor">
  revisor
</button>

<!-- Lista expansível -->
<div class="collapse" id="collapserevisor">
  <ul id="listarevisor_lista" class="list-group mt-2">
    <!-- Os itens vão ser adicionados pelo JS -->
  </ul>
</div>

<script>
async function carregarrevisor() {
    


    try {
        const response = await fetch("/get_users");
        const data = await response.json();

        const lista = document.getElementById("listarevisor_lista");
        lista.innerHTML = ""; // limpa a lista antes de adicionar



        data.users.forEach(revisor => {
            
            const li = document.createElement("li");
            li.classList.add("list-group-item", "d-flex", "align-items-center");

            li.innerHTML = `
                    <input type="checkbox" class="form-check-input me-2 revisor-check" 
                    value="${revisor.name} ${revisor.last_name}">
                    ${revisor.name} ${revisor.last_name}
                    `;


            lista.appendChild(li);
        });
    } catch (error) {
        console.error("Erro ao carregar revisor:", error);
    }
}

function checkedBox() {
    // Pega todos os checkboxes marcados
    const selecionados = Array.from(document.querySelectorAll('.revisor-check:checked'))
                              .map(checkbox => checkbox.value);

    // Monta a URL base + query string só com os selecionados
    const baseUrl = window.location.origin + window.location.pathname;
    const query = selecionados.map(item => `revisor=${encodeURIComponent(item)}`).join("&");

    window.urlString = query ? `${baseUrl}?${query}` : baseUrl;

    console.log("URL String atualizada:", window.urlString);
}

// Carrega a lista ao abrir a página
window.addEventListener("DOMContentLoaded", carregarrevisor);

// Atualiza a URL quando algum checkbox mudar
document.addEventListener("change", (e) => {
    if (e.target.classList.contains("revisor-check")) {
        checkedBox();
    }
});
</script>
