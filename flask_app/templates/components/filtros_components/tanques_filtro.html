
<!-- Botão para expandir/recolher -->
<button class="btn btn-outline-primary mb-2" type="button" data-bs-toggle="collapse" data-bs-target="#collapsetanque" aria-expanded="false" aria-controls="collapsetanque">
  tanque
</button>

<!-- Lista expansível -->
<div class="collapse" id="collapsetanque">
  <ul id="listatanque_lista" class="list-group mt-2">
    <!-- Os itens vão ser adicionados pelo JS -->
  </ul>
</div>

<script>
async function carregartanque() {
    const tanqueList = [
  "P190",
  "P1000H",
  "P1000V",
  "P500H",
  "P500V",
  "P1000H",
  "P1000V",
  "P2000V",
  "P2000H",
  "P20000H",
  "P20000V",
  "P60000V",
  "P60000H"
];


    try {
        const lista = document.getElementById("listatanque_lista");
        lista.innerHTML = ""; // limpa a lista antes de adicionar

        tanqueList.forEach(tanque => {
            const li = document.createElement("li");
            li.classList.add("list-group-item", "d-flex", "align-items-center");

            li.innerHTML = `
                <input type="checkbox" class="form-check-input me-2 tanque-check" value="${tanque}">
                ${tanque}
            `;

            lista.appendChild(li);
        });
    } catch (error) {
        console.error("Erro ao carregar tanque:", error);
    }
}

function checkedBox() {

    // Pega todos os checkboxes marcados
    const selecionados = Array.from(document.querySelectorAll('.tanque-check:checked'))
                              .map(checkbox => checkbox.value);

    // Monta a URL base + query string só com os selecionados
    const baseUrl = window.location.origin + window.location.pathname;
    const query = selecionados.map(item => `tanque=${encodeURIComponent(item)}`).join("&");

    window.urlString = query ? `${baseUrl}?${query}` : baseUrl;

    console.log("URL String atualizada:", window.urlString);
}

// Carrega a lista ao abrir a página
window.addEventListener("DOMContentLoaded", carregartanque);

// Atualiza a URL quando algum checkbox mudar
document.addEventListener("change", (e) => {
    if (e.target.classList.contains("tanque-check")) {
        checkedBox();
    }
});
</script>
